<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fotogram</title>
    <link rel="icon" type="image/x-icon" href="./assets/icons/logo.svg" />

    <link rel="stylesheet" href="./assets/styles/variables.css" />
    <link rel="stylesheet" href="./assets/styles/fonts.css" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body onload="render()">
    <header class="header_section">
      <section class="header_img">
        <img src="./assets/icons/logo_with_text.svg" alt="logo_with_text" />
      </section>
    </header>

    <main class="main_section">
      <section class="main_headline">
        <h1>Your personal photo album</h1>
      </section>
      <section id="main_img_section">
        <dialog id="myDialog">
          <div class="dialogTop">
            <p id="dialogText"></p>
            <button onclick="closeDialog()">
              <img src="./assets/icons/close.svg" alt="Close Dialog" />
            </button>
          </div>
          <img id="dialogImg" src="" alt="" />
          <div class="dialogBottom">
            <button onclick="backPicture()">
              <img src="./assets/icons/Arrow-left.svg" alt="Arrow Left" />
            </button>
            <p id="dialogCounter">1/12</p>
            <button onclick="nextPicture()" class="buttonNextPicture">
              <img src="./assets/icons/Arrow-Right.svg" alt="Arrow Right" />
            </button>
          </div>
        </dialog>
      </section>
    </main>

    <footer class="footer">
      <section class="footer_section">
        <section class="img_section">
          <img src="./assets/icons/dalogo.svg" alt="Logo_from_DA" />
          <p>© 2023 Developer Akademie GmbH</p>
        </section>
      </section>
    </footer>

    <script src="./script.js"></script>
  </body>
</html>
